<html>
<head>
    <title>Lumina - Cadastre-se</title>
    <link rel="stylesheet" href="{{css_path}}">
    
    <style>
        .form-intro {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .form-intro h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-intro p {
            color: #F5EFFF;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .cadastro-box {
            border: 1px solid #2D2D2D;
            padding: 20px 30px;
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            background-color: rgba(211, 179, 205, 0.2);
        }

        .form-group {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 12px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            font-weight: bold;
            color: #2D2D2D;
            margin-bottom: 5px;
            font-size: 0.95rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 10px 18px;
            border: 1px solid #2D2D2D;
            border-radius: 20px; 
            background-color: rgba(255, 255, 255, 0.3);
            color: #2D2D2D;
            font-size: 0.95rem;
            outline: none;
        }

        .data-inputs {
            display: flex;
            gap: 10px;
        }

        .data-inputs input {
            text-align: center;
            padding: 10px 5px;
        }

        .btn-submit-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            margin-bottom: 0px; 
        }

        .btn-submit {
            background-color: #C2C389; 
            color: white;
            border: none;
            padding: 12px 40px;
            font-size: 1.6rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 500;
            box-shadow: 0px 6px 0px #979965; 
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-submit:active {
            transform: translateY(3px);
            box-shadow: 0px 3px 0px #979965;
        }

        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 12px;
            }
            .cadastro-box {
                padding: 15px;
                margin-bottom: 40px;
            }
            .btn-submit-container {
                margin-bottom: -45px;
            }
            .btn-submit {
                font-size: 1.3rem;
                padding: 10px 25px;
            }
        }
    </style>
</head>
<body>

    <main class="main-card" style="overflow: visible;">
        
        <header>
            <div class="logo">LUMINA</div>
            <nav>
                <a href="duvidas.html">Dúvidas</a>
                <a href="sobre.html">Sobre</a>
                <a href="funcionamento.html">Funcionamento</a>
            </nav>
            <a href="#" class="btn-connect">Conecte-se</a>
        </header>

        <div class="form-intro">
            <h1>Vamos estudar!</h1>
            <p>Entre e continue sua jornada de aprendizado. Aqui, cada acesso é uma nova chance de evoluir, revisar conteúdos e conquistar seus objetivos com mais confiança.</p>
        </div>

        <div class="cadastro-box">
            <form onsubmit="event.preventDefault(); alert('Cadastro simulado com sucesso!');">
                
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Data de Nascimento</label>
                        <div class="data-inputs">
                            <input type="text" maxlength="2" placeholder="DD" required>
                            <input type="text" maxlength="2" placeholder="MM" required>
                            <input type="text" maxlength="4" placeholder="AAAA" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="nickname">Nick name:</label>
                        <input type="text" id="nickname" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="senha">Senha:</label>
                        <input type="password" id="senha" required>
                    </div>
                    <div class="form-group">
                        <label for="confirme-senha">Confirme a senha:</label>
                        <input type="password" id="confirme-senha" required>
                    </div>
                </div>

                <div class="btn-submit-container">
                    <button type="submit" class="btn-submit">Junte-se a nós!</button>
                </div>

            </form>
        </div>

    </main>

</body>
</html>
