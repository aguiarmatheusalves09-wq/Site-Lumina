<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - Conecte-se</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{{css_path}}">
    <style>
        .form-intro {
            text-align: center;
            color: #2D2D2D;
            margin-bottom: 30px;
        }

        .form-intro h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .form-intro p {
            color: #F5EFFF;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.4;
            font-size: 0.95rem;
        }

        .login-box {
            border: 1px solid #2D2D2D;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
            position: relative;
            background-color: rgba(211, 179, 205, 0.2);
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            color: #2D2D2D;
            margin-bottom: 8px;
            font-size: 0.95rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid #2D2D2D;
            border-radius: 20px;
            background-color: rgba(255, 255, 255, 0.3);
            color: #2D2D2D;
            font-size: 0.95rem;
            outline: none;
        }

        .btn-submit-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .btn-submit {
            background-color: #6C526A; 
            color: white;
            border: none;
            padding: 12px 50px;
            font-size: 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0px 6px 0px #402E3E;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn-submit:active {
            transform: translateY(3px);
            box-shadow: 0px 3px 0px #402E3E;
        }

        .cadastro-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .cadastro-link a {
            color: white;
            font-weight: bold;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <main class="main-card">
        
        <header>
            <a href="{{inicio_path}}" class="logo" style="text-decoration: none;">
                <img src="{{logo_path}}" alt="Logotipo Lumina">
                LUMINA
            </a>
            <nav>
                <a href="{{duvidas_path}}">Dúvidas</a>
                <a href="{{sobre_path}}">Sobre</a>
                <a href="{{funcionamento_path}}">Funcionamento</a>
            </nav>
            <a href="{{conecte_path}}" class="btn-connect active">Conecte-se</a>
        </header>

        <div class="form-intro">
            <h1>Bem-vindo de volta!</h1>
            <p  style="color: #2D2D2D;">Acesse sua conta para continuar seus estudos de onde parou.</p>
        </div>

        <div class="login-box">
            <form onsubmit="event.preventDefault(); alert('Login simulado com sucesso!');">
                
                <div class="form-group">
                    <label for="login-usuario">E-mail ou Nick name</label>
                    <input type="text" id="login-usuario" required>
                </div>

                <div class="form-group">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" required>
                </div>

                <div class="btn-submit-container">
                    <button type="submit" class="btn-submit">Entrar</button>
                </div>

                <div class="cadastro-link">
                    <span style="color: #2D2D2D;">Não tem uma conta?</span> 
                    <a href="{{cadastro_path}}">Cadastre-se aqui</a>
                </div>

            </form>
        </div>

    </main>

</body>
</html>
